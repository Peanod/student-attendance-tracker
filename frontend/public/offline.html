<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        background: linear-gradient(180deg, #09090b, #18181b);
        color: white;
      }
      .card {
        width: min(420px, calc(100vw - 32px));
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.14);
      }
      p {
        color: rgba(255, 255, 255, 0.74);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Anda sedang offline</h1>
      <p>
        Halaman Student Attendance Tracker tidak bisa dimuat penuh tanpa koneksi internet. Silakan sambungkan
        kembali jaringan untuk scan QR dan sinkronisasi data presensi.
      </p>
    </div>
  </body>
</html>
